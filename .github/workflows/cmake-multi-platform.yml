name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        os: [ubuntu-latest, windows-2025]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-2025
            c_compiler: cl
            cpp_compiler: cl
            vcpkg_triplet: x64-windows
            vcpkg_commit_id: 1e199d32ad53aab1defda61ce41c380302e3f95c

          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            vcpkg_triplet: x64-linux
            vcpkg_commit_id: 1e199d32ad53aab1defda61ce41c380302e3f95c

          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
            vcpkg_triplet: x64-linux
            vcpkg_commit_id: 1e199d32ad53aab1defda61ce41c380302e3f95c
        exclude:
          - os: windows-2025
            c_compiler: gcc

          - os: windows-2025
            c_compiler: clang

          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'

    - name: Install development packages
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends xorg-dev libglu1-mesa-dev autoconf autoconf-archive automake libtool

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: '${{ runner.workspace }}/b/vcpkg'
        vcpkgGitCommitId: '${{ matrix.vcpkg_commit_id }}'

    - name: Install SDL3 via vcpkg
      run: vcpkg install sdl3:${{ matrix.vcpkg_triplet }}

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_INSTALLATION_ROOT }}/scripts/buildsystems/vcpkg.cmake
        -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }}
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}
